<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Rounded rectangle background -->
  <rect width="32" height="32" rx="7" fill="#1d4ed8"/>

  <!-- Mortarboard top board (diamond) -->
  <path d="M16 5 L27 10.5 L16 16 L5 10.5 Z" fill="white"/>

  <!-- Cap body (dome visible below the board) -->
  <path d="M10.5 12 L10.5 19.5 C10.5 22.5 13 24.5 16 24.5 C19 24.5 21.5 22.5 21.5 19.5 L21.5 12"
        fill="rgba(255,255,255,0.82)"/>

  <!-- Tassel cord from right tip of board -->
  <line x1="27" y1="10.5" x2="27" y2="19"
        stroke="white" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Tassel end ball -->
  <circle cx="27" cy="21" r="2.2" fill="white"/>
</svg>
